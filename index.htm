<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好人官网</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f9f9f9;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .avatar {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 22px;
      border: 2px solid #e5e5e5;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: #1a1a1a;
      margin: 0 auto 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 360px;
    }
    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .link-card:hover {
      border-color: #1a1a1a;
      background: #1a1a1a;
      color: #fff;
    }
    .link-card:hover .arrow { color: #fff; }
    .arrow {
      font-size: 16px;
      color: #aaa;
      transition: color 0.2s;
    }
    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <img class="avatar" src="https://i.ibb.co/2Y86d3cX/Screenshot-2026-0530-121537.png" alt="头像">
  <h1>好人官网</h1>
  <div class="divider"></div>

  <div class="links">
    <a class="link-card" href="https://yun.ffkpp.top/shop/666RH" target="_blank">
      <span>🛒 官方卡网</span>
      <span class="arrow">→</span>
    </a>
    <a class="link-card" href="https://sswy6.top/t/tut2" target="_blank">
      <span>📖 教程</span>
      <span class="arrow">→</span>
    </a>
    <a class="link-card" href="https://t.me/HRTG666" target="_blank">
      <span>📢 官方频道</span>
      <span class="arrow">→</span>
    </a>
    <a class="link-card" href="https://t.me/HRTGNB" target="_blank">
      <span>💬 官方群组</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <p class="footer">© 好人官网</p>

</body>
</html>
